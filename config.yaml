# ============================================
# TTE/TTF Multi-Battery Configuration
# ============================================

execution:
  # Mode selector
  mode: "apply_battery"           # Options: train_all_batteries, apply_battery, validate

  # Pattern label (e.g., month, version)
  # Used when saving patterns to database, or loading for validation
  patterns_label: "parquet_training"    # Same label - enables incremental training

  # Optional: Filter training data by month (faster training)
  # Format: "YYYY-MM" (e.g., "2025-03" for March 2025)
  # Leave empty to use all available data
  training_month: ""                    # "" = all data, "2025-03" = March only

  # Optional: Filter apply data by month (for apply_battery mode)
  # Format: "YYYY-MM" (e.g., "2025-03" for March 2025)
  # Leave empty to use all available data
  apply_month: ""                       # "" = all data, "2025-03" = March only

  # Validation mode settings
  # Used to validate accuracy of predictions against actual TTE
  validate_month: "2025-03"             # Match training_month for fair comparison

output:
  output_dir: output
  training_data_dir: training_data
  # Note: Final validation artifacts saved to output/validation/

database:
  # SQLite database file path
  # Stores all battery patterns (decay rate statistics)
  path: "battery_patterns.db"

# train_all_batteries loads *.parquet from train_dir; apply_battery and validate use *.json from test_dir.
# Example layouts: train_dir: data/parquet  test_dir: data/json
data_sources:
  train_dir: data/training_data
  test_dir: data/testing_data

tte_ttf:
  current_threshold_ma: 50.0
  ema_window_minutes: 20
  decay_rate_window_minutes: 30       # Rolling window (30-min balance between accuracy & stability)

  # Fallback Level 2: minimum discharge rows for reliable training
  min_discharge_rows: 100                  # warn if training data has fewer discharge rows

  # Session validation thresholds for TTE/TTF estimates
  # Medium confidence: relaxed gate (emit TTE early, but less certain)
  session_min_duration_minutes: 0.0        # DISABLED: force predictions on every sample
  session_min_energy_ah: 0.0               # DISABLED: no energy requirement

  # High confidence: strict gate (very certain estimates)
  session_high_confidence_minutes: 15.0    # original strict threshold
  session_high_confidence_energy_ah: 1.0   # original strict threshold

  tte_ttf_smoothing_factor: 0.30           # EMA smoothing: increased for smoother predictions

  # TTE smoothing and stability
  # Tight symmetric rate limiting: max ±0.02h change per sample for ultra-smooth curves
  tte_max_change_per_sample: 0.02         # Rate limit: max ±0.02h change per sample (no sudden jumps)

  # Current range thresholds (in Amperes) for bucketing decay rates
  # N thresholds → N+1 buckets. Default: [0.5, 2.0, 5.0] → low, medium, high, very_high
  # Adjust based on actual current distribution: use percentiles p25, p60, p85
  # Example for wider range: [1.0, 5.0, 15.0] → low, medium, high, very_high
  current_thresholds_a: [0.5, 2.0, 5.0]

  # Rolling window for average_usage_kw calculation (minutes)
  # Shows average power consumed during discharge in the rolling window
  usage_window_minutes: 30

  # Fallback Level 4: default discharge rate when no training data or all fallbacks fail
  default_discharge_rate_pct_per_min: 0.10  # TUNING: reduced from 0.15 to reduce under-prediction

  # SOC thresholds for charger control messages (UI interpretation)
  # These are NOT hard caps — TTE/TTF can go negative/beyond range
  # Interpretation happens at UI level based on these thresholds
  soc_thresholds:
    # When SOC drops below this, set TTE=0 and trigger "plug in charger" message
    empty_soc_percent: 5.0                   # Below 5% SOC → battery empty

    # When SOC rises above this, TTF can be negative to trigger "remove charger" message
    full_soc_percent: 99.0                   # Above 99% SOC → battery full (unplug recommended)
