# ============================================
# TTE/TTF Multi-Battery Configuration
# ============================================

execution:
  # Mode selector
  mode: "validate"           # Options: train_all_batteries, apply_battery, validate

  # Pattern label (e.g., month, version)
  # Used when saving patterns to database, or loading for validation
  patterns_label: "september_2025"

  # Optional: Filter training data by month (faster training)
  # Format: "YYYY-MM" (e.g., "2025-03" for March 2025)
  # Leave empty to use all available data
  training_month: "2025-03"             # "" = all data, "2025-03" = March only

  # Optional: Filter apply data by month (for apply_battery mode)
  # Format: "YYYY-MM" (e.g., "2025-03" for March 2025)
  # Leave empty to use all available data
  apply_month: ""                       # "" = all data, "2025-03" = March only

  # Validation mode settings
  # Used to validate accuracy of predictions against actual TTE
  validate_month: ""                    # Filter validation data by month, or "" for all

output:
  output_dir: output
  training_data_dir: training_data

database:
  # SQLite database file path
  # Stores all battery patterns (decay rate statistics)
  path: "battery_patterns.db"

tte_ttf:
  current_threshold_ma: 50.0
  ema_window_minutes: 20

  # Fallback Level 2: minimum discharge rows for reliable training
  min_discharge_rows: 100                  # warn if training data has fewer discharge rows

  # Session validation thresholds for TTE/TTF estimates
  # Medium confidence: relaxed gate (emit TTE early, but less certain)
  session_min_duration_minutes: 3.0        # was 15.0 — relaxed for better coverage
  session_min_energy_ah: 0.2               # was 1.0 — relaxed for better coverage

  # High confidence: strict gate (very certain estimates)
  session_high_confidence_minutes: 15.0    # original strict threshold
  session_high_confidence_energy_ah: 1.0   # original strict threshold

  tte_ttf_smoothing_factor: 0.15

  # Current range thresholds (in Amperes) for bucketing decay rates
  # N thresholds → N+1 buckets. Default: [0.5, 2.0, 5.0] → low, medium, high, very_high
  # Adjust based on actual current distribution: use percentiles p25, p60, p85
  # Example for wider range: [1.0, 5.0, 15.0] → low, medium, high, very_high
  current_thresholds_a: [0.5, 2.0, 5.0]

  # Rolling window for average_usage_kw calculation (minutes)
  # Shows average power consumed during discharge in the rolling window
  usage_window_minutes: 30

  # Fallback Level 4: default discharge rate when no training data or all fallbacks fail
  default_discharge_rate_pct_per_min: 0.15  # conservative fleet average (%SOC/min)
